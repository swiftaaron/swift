<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Swift">
<meta name="theme-color" content="#F6F7F9">
<title>Swift</title>
<style>
  :root{--gold:#C9A24B;--gold-soft:#E7D6A8;--ink:#16181D;--ink-soft:#5B6068;--line:#ECEDF0;--bg:#F6F7F9;--card:#FFFFFF;
    --swim:#2E86C1;--bike:#3C9B6E;--run:#E08A3C;--hyrox:#16181D;--str:#8A6FB0;--brick:#C0492F;--event:#C9A24B;--good:#3C9B6E;--bad:#C0492F;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,Roboto,sans-serif}
  body{background:var(--bg);color:var(--ink)}
  #app{max-width:460px;margin:0 auto;min-height:100vh;position:relative}
  .scroll{padding:14px 18px 110px}
  .logo{font-weight:800;letter-spacing:1px}.logo .dot{color:var(--gold)}
  h2.title{font-size:23px;font-weight:800;letter-spacing:-.4px;margin:4px 0}
  .sub{color:var(--ink-soft);font-size:13.5px;line-height:1.5;margin-bottom:14px}
  .label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);margin:14px 0 8px}
  .appbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 4px}
  .appbar .hi{font-size:12.5px;color:var(--ink-soft);font-weight:600}
  .appbar .nm{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--ink),#3a3f49);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:14px;padding:15px;font-size:14.5px;font-weight:700;cursor:pointer;color:#fff;transition:.15s}
  .btn-gold{background:var(--gold)}.btn-gold:active{transform:scale(.98)}
  .btn-dark{background:var(--ink)}.btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .btn:disabled{opacity:.55}
  .btn-sm{padding:10px 12px;font-size:13px;border-radius:11px;width:auto}
  .field{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 15px;font-size:15px;width:100%;color:var(--ink)}
  .field:focus{outline:none;border-color:var(--gold)}
  textarea.field{resize:none;line-height:1.5}
  .row{display:flex;gap:9px}.row>*{flex:1}
  .card{background:var(--card);border-radius:16px;padding:15px;border:1px solid var(--line);box-shadow:0 3px 12px rgba(20,24,40,.04)}
  .card+.card{margin-top:11px}
  .sess{border-left:4px solid var(--line)}
  .sport{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:4px 9px;border-radius:20px;color:#fff}
  .stitle{font-size:16px;font-weight:800;margin:9px 0 3px;letter-spacing:-.2px}
  .starget{font-size:13px;color:var(--ink-soft);font-weight:600}
  .detail{margin-top:10px;font-size:13px;line-height:1.7;color:#3a3f49}
  .tss{font-size:11px;font-weight:700;color:var(--ink-soft);background:#F1F2F5;padding:3px 8px;border-radius:8px}
  .sessbtns{display:flex;gap:8px;margin-top:13px}
  .check{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .check.on{background:var(--good);border-color:var(--good)}.check.on::after{content:"✓";color:#fff;font-size:14px;font-weight:800}
  .chip{display:inline-flex;align-items:center;justify-content:center;padding:11px 8px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--ink-soft);transition:.12s;text-align:center}
  .chip.on{border-color:var(--gold);background:#FBF6EA;color:#9a771f}
  .wrapchips{display:flex;flex-wrap:wrap;gap:8px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink-soft)}
  .day.on{border-color:var(--gold);background:var(--gold);color:#fff}
  .weekstrip{display:flex;gap:6px;overflow-x:auto;padding:4px 0 8px}
  .weekstrip::-webkit-scrollbar{display:none}
  .wd{flex:0 0 auto;width:50px;text-align:center;padding:8px 0;border-radius:13px;border:1.5px solid var(--line);background:#fff;cursor:pointer}
  .wd.on{border-color:var(--gold);background:var(--gold);color:#fff}
  .wd.rest{opacity:.5}.wd.today{box-shadow:0 0 0 2px var(--gold-soft)}
  .wd .dn{font-size:10.5px;font-weight:700}.wd .dd{font-size:14px;font-weight:800;margin-top:1px}
  .wd .dots{display:flex;gap:2px;justify-content:center;margin-top:4px;height:5px}
  .wd .dots i{width:5px;height:5px;border-radius:50%}
  .event-banner{background:linear-gradient(135deg,#1b1d22,#33373f);color:#fff;border-radius:16px;padding:15px;margin-bottom:12px}
  .event-banner .pill{display:inline-block;background:var(--gold);color:#fff;font-size:10.5px;font-weight:800;padding:4px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
  .pill{display:inline-flex;align-items:center;gap:6px;background:#FBF6EA;color:#9a771f;font-size:11.5px;font-weight:700;padding:6px 11px;border-radius:20px}
  .pill.dark{background:rgba(255,255,255,.15);color:#fff}
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:460px;height:78px;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding-top:10px;z-index:40}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:600;color:#B5B9C1;cursor:pointer;width:70px}
  .tab.on{color:var(--gold)}.tab svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .wkrow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .wkrow:last-child{border-bottom:none}
  .wknum{width:42px;height:42px;border-radius:11px;background:#F1F2F5;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:0 0 auto}
  .wknum b{font-size:15px;font-weight:800}.wknum span{font-size:8px;color:var(--ink-soft);text-transform:uppercase}
  .wkrow.cur .wknum{background:var(--gold);color:#fff}.wkrow.cur .wknum span{color:#fff}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:80}
  .modal.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:460px;border-radius:22px 22px 0 0;padding:20px 18px 28px;max-height:88vh;overflow-y:auto}
  .setrow{display:grid;grid-template-columns:34px 1fr 1fr 40px;gap:9px;align-items:center;margin-bottom:9px}
  .setrow .sn{font-weight:800;color:var(--ink-soft);font-size:13px;text-align:center}
  .mini{background:#F6F7F9;border:1.5px solid var(--line);border-radius:10px;padding:11px;text-align:center;font-weight:700;font-size:15px;width:100%;color:var(--ink)}
  .mini:focus{outline:none;border-color:var(--gold);background:#fff}
  .toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(10px);width:90%;max-width:420px;background:var(--ink);color:#fff;padding:12px 16px;border-radius:12px;font-size:13.5px;font-weight:600;text-align:center;opacity:0;transition:.25s;z-index:90;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .muted{font-size:12px;color:var(--ink-soft);line-height:1.5}
  .errbox{background:#FCEEEA;border:1px solid #F0C4B8;color:var(--bad);padding:11px 13px;border-radius:11px;font-size:12.5px;line-height:1.5;margin-top:10px;display:none}
  .aiout{background:#FBF6EA;border:1px solid var(--gold-soft);border-radius:12px;padding:13px;font-size:13.5px;line-height:1.6;margin-top:12px;white-space:pre-wrap}
  .barwrap{display:flex;align-items:flex-end;gap:7px;height:110px;padding:8px 2px 0}
  .bar{flex:1;background:linear-gradient(180deg,var(--gold-soft),var(--gold));border-radius:5px 5px 2px 2px;min-height:4px}
  .stat{flex:1;text-align:center}.stat .v{font-size:22px;font-weight:800;letter-spacing:-.5px}.stat .v b{color:var(--gold)}
  .stat .l{font-size:10px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
  .center{display:flex;flex-direction:column;justify-content:center;min-height:82vh;padding:0 4px}
  .ring{width:64px;height:64px;border-radius:50%;border:5px solid var(--line);border-top-color:var(--gold);animation:spin 1s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:var(--gold)}
  .fbtn{position:fixed;right:calc(50% - 218px);bottom:92px;z-index:50;background:var(--ink);color:#fff;border:none;border-radius:22px;padding:10px 14px;font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.2)}
  @media(max-width:480px){.fbtn{right:16px}}
  /* homepage + chat + steps + metrics */
  .chatentry{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--gold-soft);border-radius:16px;padding:14px 16px;cursor:pointer;box-shadow:0 4px 14px rgba(201,162,75,.12)}
  .chatentry .q{flex:1;color:var(--ink-soft);font-size:14px;font-weight:600}
  .chatentry .go{width:34px;height:34px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
  .steps{display:flex;gap:6px;padding:0 0 6px}
  .steps i{height:4px;flex:1;border-radius:3px;background:var(--line)}
  .steps i.on{background:var(--gold)}
  .chatwrap{display:flex;flex-direction:column;height:calc(100vh - 150px);min-height:340px}
  .msgs{flex:1;overflow-y:auto;padding:6px 2px 12px;display:flex;flex-direction:column;gap:10px}
  .msg{max-width:82%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.5;white-space:pre-wrap}
  .msg.me{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:5px}
  .msg.ai{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:5px}
  .msg.sys{align-self:center;background:#FBF6EA;color:#9a771f;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px}
  .chatbar{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--line)}
  .chatbar input{flex:1;background:#fff;border:1.5px solid var(--line);border-radius:22px;padding:12px 16px;font-size:15px;color:var(--ink)}
  .chatbar input:focus{outline:none;border-color:var(--gold)}
  .chatbar button{width:46px;height:46px;border-radius:50%;background:var(--gold);color:#fff;border:none;font-size:18px;cursor:pointer;flex:0 0 auto}
  .liftrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .liftrow:last-child{border-bottom:none}
  .liftrow .ln{font-weight:700;font-size:14.5px;flex:1}
  .liftrow .lv{font-weight:800;font-size:15px}.liftrow .lv small{color:var(--ink-soft);font-weight:600;font-size:11px}
  .goalcard{border-left:4px solid var(--gold);background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-top:10px}
  .goalcard .gt{font-weight:700;font-size:14.5px}
  .gprog{height:7px;background:#F1F2F5;border-radius:5px;margin-top:9px;overflow:hidden}
  .gprog i{display:block;height:100%;background:var(--gold);border-radius:5px}
  .count{font-size:11px;font-weight:700;color:var(--gold)}
</style>
</head>
<body>
<div id="app">
  <div id="root"><div class="center"><div class="ring"></div><p class="sub" style="text-align:center;margin-top:16px">Loading Swift…</p></div></div>
  <div class="tabbar" id="tabbar" style="display:none">
    <div class="tab" data-tab="home"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg><span>Home</span></div>
    <div class="tab" data-tab="plan"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg><span>Plan</span></div>
    <div class="tab" data-tab="progress"><svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg><span>Metrics</span></div>
    <div class="tab" data-tab="profile"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>Profile</span></div>
  </div>
  <button class="fbtn" id="fbtn" style="display:none">Send feedback</button>
</div>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<script type="module" src="/app.js"></script>
</body>
</html>
